<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>Word Counter</h1>
        <section>
            <ul class="counters-section">
                <li class="counter">Words<span>0</span></li>
                <li class="counter">Characters<span>0</span></li>
                <li class="counter">Sentences<span>0</span></li>
                <li class="counter">Paragraphs<span>0</span></li>
            </ul>
        </section>
        <section>
            <form>
                <label for="textInput"></label>
                <textarea name="textInput" id="textInput" placeholder="Start typing or copy your text here..." rows="20"
                    cols="80"></textarea>
                <input type="submit" id="submit-count" value="Count">
            </form>
        </section>
    </main>
</body>

</html>
