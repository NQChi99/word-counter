<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>Word Counter</h1>
        <section>
            <ul class="counters-section">
                <li class="label">Words<span id="words-number">0</span></li>
                <li class="label">Characters<span id="characters-number">0</span></li>
                <li class="label">Sentences<span id="sentences-number">0</span></li>
                <li class="label">Paragraphs<span id="paragraphs-number">0</span></li>
            </ul>
        </section>
        <section>
            <label for="textInput"></label>
            <textarea name="textInput" id="textInput" placeholder="Start typing or copy your text here..." rows="24"
                cols="80"></textarea>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
