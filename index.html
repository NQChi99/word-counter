<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=content_copy,content_paste,delete" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section class="header">
            <h1>Word Counter</h1>
            <ul class="counters-section">
                <li class="label">Words<span id="words-number">0</span></li>
                <li class="label">Characters<span id="characters-number">0</span></li>
                <li class="label">Sentences<span id="sentences-number">0</span></li>
                <li class="label">Paragraphs<span id="paragraphs-number">0</span></li>
            </ul>
        </section>
        <section class="text-section">
            <div class="text-tools">
                <span id="tooltip-pasted">The text has been pasted</span>
                <button id="paste">
                    <span class="material-symbols-outlined">
                        content_paste
                    </span>Paste text</button>
                <span id="tooltip-copied">The text has been copied</span>
                <button id="copy"><span class="material-symbols-outlined">
                        content_copy
                    </span>Copy text</button>
                <span id="tooltip-cleared">The text has been cleared</span>
                <button id="clear"><span class="material-symbols-outlined">
                        delete
                    </span>Clear text</button>
            </div>
            <div>
                <label for="textInput"></label>
                <textarea name="textInput" id="textInput" placeholder="Start typing or paste your text here..."
                    rows="20" cols="80"></textarea>
            </div>
            <div class="keywords">
                <h2>Keywords</h2>
                <div id="keyword"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
